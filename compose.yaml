  #       condition: service_healthy
  #     mysql:
  #       condition: service_healthy
  #   env_file:
  #     - .env.prod
  #     - .env.futurestarcarhire
  #     - .env.futurestarcarrental
  #   volumes:
  #     - futurestarcarhire_wp:/wordpress/futurestarcarhire
