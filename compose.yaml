volumes:
  pg_data:
  mysql_data:
  futurestarcarhire_wp:
  futurestarcarrental_wp:

networks:
  frontend_backend:
    driver: bridge

  backend_database:
    driver: bridge

  wordpress_backend:
    driver: bridge
