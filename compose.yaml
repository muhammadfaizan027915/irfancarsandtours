services:
  database:
    image: postgres:latest
    env_file: .env.prod
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    networks:
      - backend_database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  migrate:
    image: ghcr.io/${GITHUB_USER}/${IMAGE_NAME}-migrate:latest
    env_file: .env.prod
    networks:
      - backend_database
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  web:
    image: ghcr.io/${GITHUB_USER}/${IMAGE_NAME}-web:latest
    env_file: .env.prod
    networks:
      - frontend_backend
      - backend_database
    depends_on:
      migrate:
        condition: service_completed_successfully
      database:
        condition: service_healthy
    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 3

  jobs:
    image: ghcr.io/${GITHUB_USER}/${IMAGE_NAME}-job:latest
    env_file: .env.prod
    networks:
      - backend_database
    depends_on:
      migrate:
        condition: service_completed_successfully
      database:
        condition: service_healthy
    restart: always

  proxy:
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
    networks:
      - frontend_backend
    restart: always

  certbot:
    image: certbot/certbot
    env_file: .env.prod
    volumes:
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      proxy:
        condition: service_started
    entrypoint: >
      sh -c "certbot certonly --non-interactive --agree-tos --email $$CERT_EMAIL --webroot --webroot-path=/var/www/certbot -d $$CERT_DOMAIN -d $$CERT_DOMAIN_WWW"

volumes:
  pg_data:
    name: irfancarsandtours_postgres_db
    driver: local

networks:
  frontend_backend:
    driver: bridge

  backend_database:
    driver: bridge
