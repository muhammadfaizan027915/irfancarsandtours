services:
  database:
    image: postgres:latest
    container_name: postgres-db-dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: icat-web-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    env_file:
      - .env.dev
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      database:
        condition: service_healthy
    restart: always

volumes:
  pg_data_dev:
    name: irfancarsandtours_pg_data_dev
