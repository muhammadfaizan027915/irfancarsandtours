services:
  database:
    image: postgres:latest
    env_file: .env.dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_database
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - .env.dev
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      WATCHPACK_POLLING: "false"
      NODE_ENV: development
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend_database
    restart: always

volumes:
  pg_data_dev:
    name: irfancarsandtours_postgres_db_dev

networks:
  backend_database:
    driver: bridge