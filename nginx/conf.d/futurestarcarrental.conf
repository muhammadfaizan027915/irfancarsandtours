server {
    listen 80;
    server_name futurestarcarrental.com www.futurestarcarrental.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.futurestarcarrental.com;

    ssl_certificate /etc/letsencrypt/live/futurestarcarrental.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/futurestarcarrental.com/privkey.pem;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name futurestarcarrental.com;

    ssl_certificate /etc/letsencrypt/live/futurestarcarrental.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/futurestarcarrental.com/privkey.pem;

    location / {
        proxy_pass http://wordpress-futurestarcarrental:80;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}


