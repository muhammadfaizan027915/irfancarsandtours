name: deploy-action
run-name: ${{ github.repository_owner }} is deploying to production.
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment files
        run: |
          # =====================================
          # Main application
          # =====================================
          cat > .env.prod << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}

          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}

          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GCS_PROJECT_ID=${{ secrets.GCS_PROJECT_ID }}
          GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY=${{ secrets.GCS_PRIVATE_KEY }}

          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}

          CERT_EMAIL=${{ secrets.CERT_EMAIL }}

          CERT_DOMAIN_IRFAN_CARS_AND_TOURS=${{ secrets.CERT_DOMAIN_IRFAN_CARS_AND_TOURS }}
          CERT_DOMAIN_IRFAN_CARS_AND_TOURS_WWW=${{ secrets.CERT_DOMAIN_IRFAN_CARS_AND_TOURS_WWW }}

          CERT_DOMAIN_FUTURE_STAR_CAR_HIRE=${{ secrets.CERT_DOMAIN_FUTURE_STAR_CAR_HIRE }}
          CERT_DOMAIN_FUTURE_STAR_CAR_HIRE_WWW=${{ secrets.CERT_DOMAIN_FUTURE_STAR_CAR_HIRE_WWW }}

          CERT_DOMAIN_FUTURE_STAR_CAR_RENTAL=${{ secrets.CERT_DOMAIN_FUTURE_STAR_CAR_RENTAL }}
          CERT_DOMAIN_FUTURE_STAR_CAR_RENTAL_WWW=${{ secrets.CERT_DOMAIN_FUTURE_STAR_CAR_RENTAL_WWW }}

          MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}

          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          BACKUP_EMAIL=${{ secrets.BACKUP_EMAIL }}

          IMAGE_NAME=${{ secrets.IMAGE_NAME }}
          GITHUB_USER=${{ github.repository_owner }}
          EOF


          # =====================================
          # Future Star Car Hire
          # =====================================
          cat > .env.futurestarcarhire << EOF
          WORDPRESS_DB_HOST=${{ secrets.WORDPRESS_DB_HOST }}
          WORDPRESS_DB_USER=${{ secrets.WORDPRESS_DB_USER }}
          WORDPRESS_DB_PASSWORD=${{ secrets.WORDPRESS_DB_PASSWORD }}
          WORDPRESS_DB_NAME=${{ secrets.WORDPRESS_DB_NAME_FUTURESTAR_CAR_HIRE }}
          EOF

          # =====================================
          # Future Star Car Rental
          # =====================================
          cat > .env.futurestarcarrental << EOF
          WORDPRESS_DB_HOST=${{ secrets.WORDPRESS_DB_HOST }}
          WORDPRESS_DB_USER=${{ secrets.WORDPRESS_DB_USER }}
          WORDPRESS_DB_PASSWORD=${{ secrets.WORDPRESS_DB_PASSWORD }}
          WORDPRESS_DB_NAME=${{ secrets.WORDPRESS_DB_NAME_FUTURESTAR_CAR_RENTAL }}
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-web:latest

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrate
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-migrate:latest

      - name: Build and push certbot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.certbot
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-certbot:latest

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backup
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-backup:latest

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".env.prod,.env.futurestarcarhire,.env.futurestarcarrental,compose.yaml,nginx"
          target: /home/irfancarsandtours
          overwrite: true
          debug: true
          timeout: 60s
          command_timeout: 10m

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/irfancarsandtours
            cp .env.prod .env
            docker compose pull
            docker compose up -d
            docker image prune -af
