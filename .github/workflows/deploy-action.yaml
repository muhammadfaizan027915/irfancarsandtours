name: deploy-action
run-name: ${{github.repository_owner}} is deploying to production.
on: 
  push:
    branches:
      - main

jobs:
  checkout:
    name: Checkout
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

  build:
    name: Docker Build & Push to GHCR
    runs-on: ubuntu-latest
    
    steps:

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ghcr.io/${{github.repository_owner}}/irfancarsandtours-web:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrate
          push: true
          tags: ghcr.io/${{github.repository_owner}}/irfancarsandtours-migrate:latest
  
  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest

    steps:

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/irfancarsandtours

            docker compose pull

            docker compose up -d

            docker image prune -af