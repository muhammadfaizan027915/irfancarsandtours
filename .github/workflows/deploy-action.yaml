name: deploy-action
run-name: ${{ github.repository_owner }} is deploying to production.

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat > .env.prod << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GCS_PROJECT_ID=${{ secrets.GCS_PROJECT_ID }}
          GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY=${{ secrets.GCS_PRIVATE_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          CERT_DOMAIN=${{ secrets.CERT_DOMAIN }}
          CERT_EMAIL=${{ secrets.CERT_EMAIL }}
          CERT_DOMAIN_WWW=${{ secrets.CERT_DOMAIN_WWW }}
          MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          IMAGE_NAME=${{ secrets.IMAGE_NAME }}
          GITHUB_USER=${{ github.repository_owner }}
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-web:latest

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrate
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ secrets.IMAGE_NAME }}-migrate:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Create env file
        run: |
          cat > .env.prod << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GCS_PROJECT_ID=${{ secrets.GCS_PROJECT_ID }}
          GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY=${{ secrets.GCS_PRIVATE_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          CERT_DOMAIN=${{ secrets.CERT_DOMAIN }}
          CERT_EMAIL=${{ secrets.CERT_EMAIL }}
          CERT_DOMAIN_WWW=${{ secrets.CERT_DOMAIN_WWW }}
          MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          IMAGE_NAME=${{ secrets.IMAGE_NAME }}
          GITHUB_USER=${{ github.repository_owner }}
          EOF

      - name: Copy env file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: .env.prod
          target: /home/irfancarsandtours/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/irfancarsandtours
            docker compose pull
            docker compose up -d
            docker image prune -af